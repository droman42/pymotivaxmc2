name: CI

# One pipeline for the whole lifecycle:
#   health + test   -> every push and PR to main (in parallel)
#   release jobs    -> only on a `v*` tag push, gated on health + test
#                      passing for that exact commit
on:
  push:
    branches: [main]
    tags: ["v*"] # Release trigger (e.g. v1.2.3)
  pull_request:
    branches: [main]

# Cancel superseded runs on branches/PRs, but never cancel a release run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # All three Python health gates run via the shared composite action in
      # droman42/py-dev-gates. The action sets up Python, installs the project's
      # [dev] extras (which include pyright + import-linter), then runs
      # lint-imports, check-no-type-checking, and pyright. A one-line bump of the
      # @v0.1.1 ref picks up future gate/pyright changes with no per-repo drift.
      - uses: droman42/py-dev-gates/.github/actions/python-health@v0.1.1
        with:
          src: pymotivaxmc2
          working-directory: .
          python-version: "3.11"

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ---- Release jobs: only on a v* tag, only after health + test pass ----
  # Skipping validate-version skips the whole chain below it (`needs`
  # propagates), so the single `if` here gates every release job.

  validate-version:
    name: Validate Tag Version
    needs: [health, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      tag-version: ${{ steps.get-version.outputs.tag-version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Extract and validate versions
        id: get-version
        run: |
          # Extract version from git tag (remove 'v' prefix)
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "tag-version=$TAG_VERSION" >> $GITHUB_OUTPUT

          # Extract version from pyproject.toml
          PYPROJECT_VERSION=$(python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
              print(data['project']['version'])
          ")
          echo "version=$PYPROJECT_VERSION" >> $GITHUB_OUTPUT

          echo "🏷️  Git tag version: $TAG_VERSION"
          echo "📄 pyproject.toml version: $PYPROJECT_VERSION"

          # Compare versions
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "❌ Version mismatch detected!"
            echo "   Git tag: v$TAG_VERSION"
            echo "   pyproject.toml: $PYPROJECT_VERSION"
            echo "   Please ensure both versions match before creating a release."
            exit 1
          fi

          echo "✅ Version validation passed: $TAG_VERSION"

  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: validate-version

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build source distribution and wheel
        run: |
          python -m build
          echo "📦 Built packages:"
          ls -la dist/

      - name: Verify distribution
        run: |
          python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: python-packages
          path: dist/
          retention-days: 7

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [validate-version, build]
    permissions:
      id-token: write # Required for trusted publishing to PyPI

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: python-packages
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-version, publish-pypi]
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch full history for changelog

      - name: Generate release notes
        id: release-notes
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"

          # Get previous tag for changelog
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -v "^v${VERSION}$" | head -n1)

          if [ -n "$PREVIOUS_TAG" ]; then
            echo "## 📋 Changes since $PREVIOUS_TAG" > release-notes.md
            echo "" >> release-notes.md
            git log --pretty=format:"- %s (%h)" "$PREVIOUS_TAG..HEAD" >> release-notes.md
          else
            echo "## 🎉 Initial Release" > release-notes.md
            echo "" >> release-notes.md
            echo "First release of pymotivaxmc2 v${VERSION}" >> release-notes.md
          fi

          echo "" >> release-notes.md
          echo "## 📦 Installation" >> release-notes.md
          echo "" >> release-notes.md
          echo "\`\`\`bash" >> release-notes.md
          echo "pip install pymotivaxmc2==${VERSION}" >> release-notes.md
          echo "\`\`\`" >> release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "Release v${{ needs.validate-version.outputs.version }}"
          body_path: release-notes.md
          draft: false
          prerelease: false
          generate_release_notes: true
          append_body: true
